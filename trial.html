<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal</title>
    <style>
        /* Eliminates scrollbars and gaps around the edge of the screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117; /* Seamless dark match for web app loading */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Embedded Google Apps Script App -->
    <iframe 
      src="https://script.google.com/macros/s/AKfycbwT9HJIlCDUyyQAemcsITTzDew5VcpYAk9Q7zQlfBtQbbWnC-qwU011xZJ3S9EA0xXv/exec" 
      allow="geolocation; microphone; camera; clipboard-write">
    </iframe>

</body>
</html>
