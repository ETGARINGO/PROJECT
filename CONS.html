<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT DIRECTORY | ACCESS_PORTAL</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #39ff14;
            --neon-dim: rgba(57, 255, 20, 0.2);
            --deep-obsidian: #020202;
            --glass: rgba(10, 10, 10, 0.96);
            --danger: #ff3e3e;
            --gold: #ffcc00;
            --info: #00d4ff;
            --success: #198754;
            --secondary: #6c757d;
            --warning: #ffc107;
            --primary: #0d6efd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--deep-obsidian); color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100dvh; overflow: hidden;
        }

        /* --- BACKGROUND FX --- */
        .neural-net { position: fixed; inset: 0; z-index: -1; background: #000; }
        .grid {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 50px 50px; transform: rotateX(60deg);
            animation: move 20s linear infinite; opacity: 0.15;
        }
        @keyframes move { from { transform: rotateX(60deg) translateY(0); } to { transform: rotateX(60deg) translateY(50px); } }

        /* --- LIGHTNING GATE KEEPER --- */
        #gate {
            position: fixed; inset: 0; background: var(--deep-obsidian);
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s cubic-bezier(0.9, 0, 0.1, 1); overflow: hidden;
        }
        .gate-off { transform: scale(1.2); opacity: 0; pointer-events: none; }
        
        .thunder-flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1; }
        
        .lock-btn { 
            width: 180px; height: 180px; border: 2px solid var(--neon); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            position: relative; z-index: 2; transition: 0.3s;
        }
        .lock-btn::after { content: ''; position: absolute; inset: -10px; border: 1px solid var(--neon-dim); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        .bolt {
            position: absolute; top: 50%; left: 50%; width: 2px; background: #fff;
            transform-origin: top; opacity: 0; z-index: 1;
            filter: drop-shadow(0 0 10px var(--info)) drop-shadow(0 0 20px #fff);
        }

        @keyframes strike {
            0% { filter: brightness(1) contrast(1); }
            10% { filter: brightness(10) contrast(2) hue-rotate(180deg); }
            100% { filter: brightness(1) contrast(1); }
        }
        @keyframes screen-shake {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-8px, 8px); }
            40% { transform: translate(8px, -8px); }
            60% { transform: translate(-8px, -8px); }
            80% { transform: translate(8px, 8px); }
        }
        .active-strike { animation: strike 0.4s ease-out; }
        .active-shake { animation: screen-shake 0.3s; }

        /* --- SHELL LAYOUT --- */
        .app-shell { display: flex; height: 100dvh; width: 100vw; padding: 10px; gap: 10px; }

        .sidebar {
            width: 360px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid var(--neon);
        }

        .main-view { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }

        header { 
            height: 60px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
        }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .kpi { background: var(--glass); padding: 10px; border-bottom: 2px solid var(--neon-dim); }
        .kpi span { font-size: 0.6rem; color: #666; display: block; }
        .kpi b { font-family: 'Orbitron'; color: var(--neon); font-size: 0.8rem; }

        .nav-list { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: var(--neon-dim) transparent; }
        .nav-item {
            padding: 12px; margin-bottom: 6px; background: rgba(255,255,255,0.02);
            display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer;
            border-radius: 4px; border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(57, 255, 20, 0.05); border-color: var(--neon-dim); }
        .nav-item.active { background: var(--neon); color: #000; font-weight: 800; }

        .viewport { position: relative; flex: 1; background: #000; overflow: hidden; border: 1px solid #111; }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: 0.4s; }
        
        .loading-bar {
            position: absolute; top: 0; left: 0; height: 2px; background: var(--neon);
            width: 0%; transition: 0.3s; z-index: 10;
        }

        .audio-toggle {
            background: none; border: 1px solid var(--neon); color: var(--neon);
            padding: 4px 8px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer;
            margin-right: 5px; transition: 0.3s;
        }
        .audio-toggle:hover { background: var(--neon); color: #000; }

        @media (max-width: 900px) {
            .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 1000; width: 85%; }
            .sidebar.active { left: 0; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .mobile-menu-btn { display: block !important; }
        }

        .mobile-menu-btn { display: none; background: var(--neon); color: #000; border: none; padding: 8px 12px; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <audio id="sfx-click"><source src="https://rpg.hamsterrepublic.com/ohrrpgce/sounds/click.wav" type="audio/mpeg"></audio>
    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <div class="neural-net"><div class="grid"></div></div>

    <div id="gate">
        <div class="thunder-flash" id="flash"></div>
        <div id="lightning-container" style="position:absolute; inset:0; pointer-events:none;"></div>
        
        <div class="lock-btn" onclick="triggerLightning();">
            <img id="logo-img" src="5FC6C77A-BAD0-4FFA-B908-DBEA57CFCB03.png" style="width:100px; filter: drop-shadow(0 0 10px var(--neon));" alt="LOGO">
        </div>
        <p style="margin-top:40px; font-family:'Orbitron'; color:var(--neon); letter-spacing:5px; font-size:0.7rem; z-index:2;">PROJECT_ACCESS_PORTAL_SAMPLES</p>
    </div>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
                <h2 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--neon);">PROJECT DASHBOARD</h2>
                <button class="mobile-menu-btn" onclick="toggleMenu()">CLOSE</button>
            </div>
            <div style="padding:10px;">
                <input type="text" id="search" placeholder="SEARCH SYSTEM..." onkeyup="search()" 
                       style="width:100%; background:#000; border:1px solid #333; padding:12px; color:var(--neon); font-family:'JetBrains Mono'; outline:none; font-size:0.8rem;">
            </div>
            <div class="nav-list" id="list"></div>
        </aside>

        <main class="main-view">
            <header>
                <button class="mobile-menu-btn" onclick="toggleMenu()">MENU</button>
                <div style="font-size:0.6rem; color:#555">ACTIVE_NODE: <span id="node-name" style="color:var(--neon)">---</span></div>
                <div id="timer" style="font-family:'Orbitron'; color:var(--neon); font-size:1.1rem;">00:00</div>
                <div style="display: flex;">
                    <button id="mute-btn" class="audio-toggle" onclick="toggleMusic()">MUSIC: ON</button>
                    <button onclick="location.reload()" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:4px 10px; font-family:'Orbitron'; font-size:0.55rem;">RESET</button>
                </div>
            </header>

            <div class="kpi-row">
                <div class="kpi"><span>OS_REVENUE</span><b id="rev">$0.00</b></div>
                <div class="kpi"><span>STATUS</span><b>STABLE</b></div>
                <div class="kpi"><span>LATENCY</span><b id="ping">0.002ms</b></div>
                <div class="kpi"><span>UPLINK</span><b id="traffic">0.0 GB/s</b></div>
            </div>

            <div class="viewport" id="viewport">
                <div class="loading-bar" id="loader"></div>
                <iframe id="frame" src="about:blank" onload="done()"></iframe>
            </div>
        </main>
    </div>

    <script>
        const appData = [
            { title: "Staycation Booking", link: "https://staycationapp.web247.online/BOOKING", icon: "bi-person-badge", color: "var(--gold)" },
            { title: "Staycation Admin", link: "https://staycationapp.web247.online/admin", icon: "bi-droplet-half", color: "var(--primary)" },
            { title: "Travel & Tour Booking System", link: "https://booktravel.web247.online", color: "var(--primary)" },
            { title: "GCash & E-Load", link: "https://script.google.com/macros/s/AKfycbwfZDpTxL4IgOqzK7X87XuNopCd7UpgaGRmkAnQ7gQu7JZkQrdalTndrn7J4BQZMVb7/exec", icon: "bi-people", color: "var(--warning)" },
            { title: "Water Order", link: "https://aquapure.web247.online/Order", icon: "bi-building", color: "var(--primary)" },
            { title: "Water Admin", link: "https://aquapure.web247.online/Admin", icon: "bi-building", color: "var(--info)" },
            { title: "Recruitment System", link: "https://script.google.com/macros/s/AKfycbxFmKVmdF6ndT6oddEZajhOpOmeejBKCv6aa6e-5tyMercimYcP1etKdzHrRisC43x3JQ/exec?page=admin", icon: "bi-person-workspace", color: "var(--success)" },
            { title: "Resto Bars & Cafe", link: "https://bondat.web247.online/Dash", icon: "bi-person-badge", color: "var(--warning)" },
            { title: "Resto Admin", link: "https://bondat.web247.online/admin", icon: "bi-droplet-half", color: "var(--danger)" },
            { title: "Barbershop App", link: "https://www.facebook.com/reel/1168886018559673", icon: "bi-people", color: "var(--secondary)" },
            { title: "RSVP Invitation", link: "https://www.facebook.com/share/r/186dkTk3ry/", icon: "bi-building", color: "var(--danger)" },
            { title: "Wish List Party", link: "https://www.facebook.com/share/p/1HR5fG2NCq/", icon: "bi-building", color: "var(--info)" },
            { title: "Sari-Sari Stock", link: "https://script.google.com/macros/s/AKfycbzQTF6wfdbMhN4PKjLLx6s43JEUIIT-BK488BXU0clVek_SbeT7fYMmvY2oGswJzMs2/exec", icon: "bi-file-earmark-text", color: "var(--success)" },
            { title: "Record Storage", link: "https://www.facebook.com/share/p/1NRkBxbg9U/", icon: "bi-person-badge", color: "var(--primary)" },
            { title: "Logo Maker", link: "https://www.facebook.com/share/1JsdCtyTEf/", icon: "bi-droplet-half", color: "var(--warning)" },
            { title: "Hilot Booking", link: "https://www.facebook.com/share/v/14ZUQUK38jS/", icon: "bi-people", color: "var(--success)" },
            { title: "Inventory Tracker", link: "https://www.facebook.com/share/p/1HCuQwMZLq/", icon: "bi-box-seam", color: "var(--secondary)" },
            { title: "Payroll Calc", link: "https://www.facebook.com/on.line.151642", icon: "bi-calculator", color: "var(--success)" },
            { title: "Fleet Management", link: "https://www.facebook.com/on.line.151642", icon: "bi-truck", color: "var(--info)" },
            { title: "Procurement System", link: "https://www.facebook.com/on.line.151642", icon: "bi-cart-check", color: "var(--warning)" },
            { title: "E-Library", link: "https://www.facebook.com/on.line.151642", icon: "bi-book", color: "var(--primary)" },
            { title: "Client CRM", link: "https://www.facebook.com/on.line.151642", icon: "bi-person-vcard", color: "var(--danger)" },
            { title: "Task Scheduler", link: "https://www.facebook.com/on.line.151642", icon: "bi-calendar-check", color: "var(--info)" },
            { title: "Survey Tool", link: "https://www.facebook.com/on.line.151642", icon: "bi-clipboard-data", color: "var(--success)" },
            { title: "Visitor Logbook", link: "https://www.facebook.com/on.line.151642", icon: "bi-person-walking", color: "var(--secondary)" },
            { title: "Barangay Info", link: "https://buenlag2nd.web247.online/Buenlag2nd#", icon: "bi-person-vcard", color: "var(--secondary)" }
        ];

        let musicPlaying = true;
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.3; // Gentle background volume

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        function toggleMusic() {
            const btn = document.getElementById('mute-btn');
            if (musicPlaying) {
                bgMusic.pause();
                btn.innerText = "MUSIC: OFF";
                btn.style.borderColor = "var(--danger)";
                btn.style.color = "var(--danger)";
            } else {
                bgMusic.play();
                btn.innerText = "MUSIC: ON";
                btn.style.borderColor = "var(--neon)";
                btn.style.color = "var(--neon)";
            }
            musicPlaying = !musicPlaying;
        }

        function triggerLightning() {
            const gate = document.getElementById('gate');
            const flash = document.getElementById('flash');
            const logo = document.getElementById('logo-img');
            const container = document.getElementById('lightning-container');

            gate.classList.add('active-shake');
            flash.style.opacity = "0.7";
            logo.classList.add('active-strike');

            for (let i = 0; i < 10; i++) {
                const bolt = document.createElement('div');
                bolt.className = 'bolt';
                const angle = Math.random() * 360;
                const len = 100 + Math.random() * 200;
                bolt.style.height = `${len}px`;
                bolt.style.transform = `rotate(${angle}deg) translateY(60px)`;
                bolt.style.opacity = "1";
                container.appendChild(bolt);
                setTimeout(() => bolt.remove(), 200);
            }

            setTimeout(() => {
                flash.style.opacity = "0";
                gate.classList.remove('active-shake');
                unlock();
            }, 400);
        }

        function unlock() {
            // Start the corporate inspo music on successful entry
            bgMusic.play().catch(e => console.log("Music blocked until interaction"));
            
            document.getElementById('gate').classList.add('gate-off');
            document.getElementById('rev').innerText = "$921,084.10";
            loadNode(0);
        }

        function loadNode(idx) {
            document.getElementById('sfx-click').play().catch(()=>{});
            const data = appData[idx];
            const frame = document.getElementById('frame');
            document.getElementById('loader').style.width = "30%";
            frame.style.opacity = "0";
            
            setTimeout(() => {
                frame.src = data.link;
                document.getElementById('node-name').innerText = data.title.toUpperCase();
                document.querySelectorAll('.nav-item').forEach((item, i) => {
                    item.classList.toggle('active', i === idx);
                });
                if(window.innerWidth < 900) toggleMenu();
            }, 200);
        }

        function done() {
            document.getElementById('loader').style.width = "100%";
            setTimeout(() => {
                document.getElementById('loader').style.width = "0%";
                document.getElementById('frame').style.opacity = "1";
            }, 400);
        }

        function search() {
            const val = document.getElementById('search').value.toUpperCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                item.style.display = item.innerText.toUpperCase().includes(val) ? "flex" : "none";
            });
        }

        const list = document.getElementById('list');
        appData.forEach((app, i) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.innerHTML = `<i class="${app.icon}" style="color:${app.color}"></i><span>${app.title}</span>`;
            div.onclick = () => loadNode(i);
            list.appendChild(div);
        });

        setInterval(() => {
            const d = new Date();
            document.getElementById('timer').innerText = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
            document.getElementById('traffic').innerText = (Math.random()*5 + 1).toFixed(2) + " GB/s";
        }, 1000);
    </script>
</body>
</html>
