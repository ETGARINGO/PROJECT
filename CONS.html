<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT DATABASE | APEX_UPGRADE</title>

    <link rel="icon" type="image/png" href="5FC6C77A-BAD0-4FFA-B908-DBEA57CFCB03.png">

    <style>
        :root {
            --hazard-red: #ff0000;
            --laser-green: #39ff14;
            --terminal-dark: #010101;
            --ui-glow: rgba(57, 255, 20, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--terminal-dark);
            font-family: 'Consolas', monospace;
            overflow: hidden;
            height: 100vh;
            color: var(--laser-green);
        }

        /* ================= TACTICAL LOGO SCANNER ================= */
        .logo-scanner {
            position: relative;
            display: inline-block;
            transition: 0.4s;
        }

        .site-logo {
            height: 60px;
            width: auto;
            filter: drop-shadow(0 0 10px var(--laser-green));
            animation: pulse-glow 2s infinite alternate;
        }

        /* THE SCAN LINE */
        .logo-scanner::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 2px;
            background: var(--laser-green);
            box-shadow: 0 0 15px var(--laser-green);
            animation: scan-move 3s infinite linear;
            z-index: 2;
        }

        @keyframes scan-move {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 5px var(--laser-green)) brightness(1); }
            to { filter: drop-shadow(0 0 20px var(--laser-green)) brightness(1.3); }
        }

        /* ================= HUD CORNERS ================= */
        .hud-bracket {
            position: fixed; width: 40px; height: 40px;
            border: 2px solid var(--laser-green);
            z-index: 10015; pointer-events: none; opacity: 0.5;
        }
        .top-l { top: 100px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-r { top: 100px; right: 20px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bot-r { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* ================= NAV BAR ================= */
        .nav-bar {
            height: 85px;
            background: linear-gradient(to bottom, #000, rgba(0,0,0,0.8));
            border-bottom: 1px solid var(--laser-green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 10011;
        }

        .system-data {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            margin-left: 15px;
        }

        /* ================= DYNAMIC LOG ================= */
        #log-feed {
            position: fixed; bottom: 40px; right: 80px;
            font-size: 0.65rem; color: var(--laser-green);
            text-align: right; pointer-events: none;
            opacity: 0; transition: 1s; z-index: 10012;
        }

        /* ================= BREACH OVERLAY ================= */
        #war-disco-gate {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 99999; transition: 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .btn-initialize {
            margin-top: 30px;
            padding: 10px 40px;
            border: 1px solid var(--laser-green);
            background: transparent;
            color: var(--laser-green);
            font-family: 'Consolas';
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-initialize:hover {
            background: var(--laser-green);
            color: #000;
            box-shadow: 0 0 30px var(--laser-green);
        }

        .content-frame {
            position: absolute; top: 85px; left: 0; width: 100%; height: calc(100% - 85px);
            border: none; filter: brightness(0.8) contrast(1.2);
            background: #000;
        }

        .gate-open { transform: scale(1.5); opacity: 0; pointer-events: none; }
    </style>
</head>
<body id="main-body">

    <div class="hud-bracket top-l"></div>
    <div class="hud-bracket top-r"></div>
    <div class="hud-bracket bot-l"></div>
    <div class="hud-bracket bot-r"></div>
    <div id="log-feed">SYSTEM_READY...</div>

    <div id="war-disco-gate">
        <div class="logo-scanner">
            <img src="5FC6C77A-BAD0-4FFA-B908-DBEA57CFCB03.png" class="site-logo" style="height: 150px;">
        </div>
        <button class="btn-initialize" onclick="initiateBreach()">INITIALIZE_BREACH</button>
    </div>

    <header class="nav-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-scanner">
                <img src="5FC6C77A-BAD0-4FFA-B908-DBEA57CFCB03.png" class="site-logo">
            </div>
            <div class="system-data">
                <div style="color:var(--laser-green)">SECURED_ACCESS_NODE</div>
                <div id="clock">00:00:00</div>
            </div>
        </div>
        <a href="javascript:location.reload()" style="color:var(--hazard-red); text-decoration:none; border:1px solid; padding:8px 20px; font-size:0.7rem; font-weight:bold;">TERMINATE</a>
    </header>

    <iframe src="https://script.google.com/macros/s/AKfycbyo_ztCZ0Eq9GM3bONEM3zY06v3at5OFPCH1IxP3MSMgiyP7fkqRMzYcZXu6_cQZttn/exec" class="content-frame"></iframe>

    <audio id="disco-rock" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logFeed = document.getElementById('log-feed');
        
        // Live Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // System Log Generator
        const logs = [
            "BYPASSING_FIREWALL...",
            "DECRYPTING_PACKETS...",
            "INJECTING_DATABASE_TOKEN...",
            "ESTABLISHING_ENCRYPTED_TUNNEL...",
            "NODE_RESPONSE_SUCCESS",
            "ACCESS_GRANTED_BY_ROOT"
        ];

        function runLogs() {
            logFeed.style.opacity = "1";
            let i = 0;
            setInterval(() => {
                logFeed.innerHTML += `<br>${logs[i % logs.length]}`;
                i++;
                if(i > 10) logFeed.innerHTML = logs[i % logs.length]; // Clear old logs
            }, 2000);
        }

        function initiateBreach() {
            document.getElementById('disco-rock').play();
            document.getElementById('war-disco-gate').classList.add('gate-open');
            runLogs();
        }
    </script>
</body>
</html>
