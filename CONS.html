<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINE WEB APP PROJECTS | COMMAND_OS</title>
    
    <link rel="icon" type="image/png" href="5FC6C77A-BAD0-4FFA-B908-DBEA57CFCB03.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #39ff14;
            --neon-dim: rgba(57, 255, 20, 0.3);
            --deep-obsidian: #020202;
            --glass: rgba(12, 12, 12, 0.9);
            --danger: #ff3e3e;
            --gold: #ffcc00;
            --info: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--deep-obsidian); color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; overflow: hidden;
        }

        /* --- VISUAL FX --- */
        body::after {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(57, 255, 20, 0.02), transparent, rgba(57, 255, 20, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .neural-net { position: fixed; inset: 0; z-index: -1; background: #000; overflow: hidden; }
        .neural-grid {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 60px 60px; transform: rotateX(55deg);
            animation: grid-move 25s linear infinite; opacity: 0.12;
        }
        @keyframes grid-move { from { transform: rotateX(55deg) translateY(0); } to { transform: rotateX(55deg) translateY(60px); } }

        /* --- ENTRANCE GATE --- */
        #gate-keeper {
            position: fixed; inset: 0; background: var(--deep-obsidian);
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .gate-open { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .auth-portal {
            width: 280px; height: 280px; position: relative;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .auth-ring {
            position: absolute; inset: 0; border: 2px solid var(--neon-dim);
            border-radius: 50%; animation: pulse-ring 2s infinite;
        }
        .auth-portal img {
            width: 150px; height: 150px; object-fit: contain;
            filter: drop-shadow(0 0 15px var(--neon)); z-index: 5;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }

        /* --- MAIN UI LAYOUT --- */
        .app-shell {
            display: grid; grid-template-columns: 380px 1fr; grid-template-rows: 80px 1fr;
            height: 100vh; width: 100vw; padding: 15px; gap: 15px;
        }

        .sidebar {
            grid-row: 1 / 3; background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid var(--neon); display: flex; flex-direction: column; overflow: hidden;
        }

        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h1 { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--neon); letter-spacing: 4px; }

        .nav-list { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-item {
            padding: 14px 18px; margin-bottom: 6px; background: rgba(255,255,255,0.02);
            display: flex; align-items: center; gap: 15px; transition: 0.2s; border-radius: 2px;
            font-size: 0.75rem;
        }
        .nav-item:hover { background: rgba(57, 255, 20, 0.1); transform: translateX(5px); }
        .nav-item.active { background: var(--neon); color: #000; font-weight: 800; }

        header { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .kpi-card { background: var(--glass); padding: 15px; border-bottom: 2px solid var(--neon-dim); }
        .kpi-card b { font-family: 'Orbitron'; font-size: 0.95rem; color: var(--neon); }

        /* --- RUNNING BORDER LOADING STYLE --- */
        .viewport-wrapper {
            position: relative; flex: 1; padding: 3px; 
            background: #000; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* The Animated Snake Border */
        .viewport-wrapper.loading::before {
            content: ''; position: absolute; height: 150%; width: 150%;
            background-image: conic-gradient(transparent, transparent, transparent, var(--neon));
            left: -25%; top: -25%;
            animation: rotate-border 3s linear infinite;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }

        .viewport { 
            background: #000; flex: 1; width: 100%; height: 100%; 
            position: relative; z-index: 1; overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/pang/paza-moduless.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-unlock">
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/Cymbal_Clap.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-nav">
        <source src="https://rpg.hamsterrepublic.com/ohrrpgce/sounds/click.wav" type="audio/mpeg">
    </audio>

    <div class="neural-net"><div class="neural-grid"></div></div>

    <div id="gate-keeper">
        <div class="auth-portal" onclick="unlock()">
            <div class="auth-ring"></div>
            <img src="5FC6C77A-BAD0-4FFA-B908-DBEA57CFCB03.png" alt="OS LOGO">
        </div>
        <div style="margin-top: 40px; text-align: center;">
            <p style="font-family: 'Orbitron'; color: var(--neon); letter-spacing: 10px; font-weight: 900;">PROJECT DASHBOARD</p>
            <p style="color: #444; font-size: 0.65rem; margin-top: 10px;">SYSTEM BORDER SYNCHRONIZATION ACTIVE</p>
        </div>
    </div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-header"><h1>ONLINE WEB APP PROJECTS | COMMAND_OS</h1></div>
            <div style="padding: 15px;">
                <input type="text" id="modSearch" placeholder="SEARCH..." onkeyup="filter()" 
                       style="width: 100%; background: #000; border: 1px solid #222; padding: 10px; color: var(--neon); font-family: 'JetBrains Mono'; outline: none;">
            </div>
            <div class="nav-list" id="nav-list"></div>
            <div style="padding: 15px; font-size: 0.6rem; border-top: 1px solid #111;">
                <div id="status-log" style="color:var(--neon); opacity: 0.8;">Awaiting uplink...</div>
            </div>
        </aside>

        <header>
            <div style="font-family:'Orbitron'; font-size:0.65rem; color:#555">NODE: <span style="color:var(--neon)" id="current-mod">---</span></div>
            <div id="clock" style="font-family:'Orbitron'; font-size: 1.3rem; color: var(--neon);">00:00:00</div>
            <button style="background:none; border:1px solid var(--danger); color:var(--danger); padding:5px 15px; font-size:0.6rem; font-family:'Orbitron';" onclick="location.reload()">TERMINATE</button>
        </header>

        <main style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                <div class="kpi-card"><span>REVENUE</span><br><b id="kpi-rev">$0.00</b></div>
                <div class="kpi-card"><span>NEURAL_LINK</span><br><b>ACTIVE</b></div>
                <div class="kpi-card"><span>STREAM</span><br><b id="kpi-stream">0.0 GB/s</b></div>
                <div class="kpi-card"><span>LATENCY</span><br><b>0.002ms</b></div>
            </div>
            
            <div class="viewport-wrapper" id="view-wrapper">
                <div class="viewport">
                    <iframe id="main-view" src="about:blank" onload="stopLoading()"></iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        const appData = [
            { title: "Staycation Booking", link: "https://staycationapp.web247.online/BOOKING", icon: "bi-person-badge", color: "var(--gold)" },
            { title: "Staycation Admin", link: "https://staycationapp.web247.online/admin", icon: "bi-shield-check", color: "var(--info)" },
            { title: "GCash & E-Load", link: "https://www.facebook.com/share/v/1DxqGDdWdx/", icon: "bi-wallet2", color: "#ffc107" },
            { title: "Water Order", link: "https://aquapure.web247.online/Order", icon: "bi-droplet", color: "var(--info)" },
            { title: "Water Admin", link: "https://aquapure.web247.online/Admin", icon: "bi-gear", color: "var(--info)" },
            { title: "Recruitment System", link: "https://www.facebook.com/share/v/17tmq4czHZ/", icon: "bi-file-earmark-text", color: "#198754" },
            { title: "Resto Bars & Cafe", link: "https://bondat.web247.online/Dash", icon: "bi-cup-hot", color: "#ffc107" },
            { title: "Resto Admin", link: "https://bondat.web247.online/admin", icon: "bi-lock", color: "var(--danger)" },
            { title: "Barbershop App", link: "https://www.facebook.com/share/v/1B8GHYGgDb/", icon: "bi-scissors", color: "#6c757d" },
            { title: "RSVP Invitation", link: "https://www.facebook.com/share/r/186dkTk3ry/", icon: "bi-envelope", color: "var(--danger)" },
            { title: "Wish List Party", link: "https://www.facebook.com/share/p/1HR5fG2NCq/", icon: "bi-gift", color: "var(--info)" },
            { title: "Sari-Sari Stock", link: "https://www.facebook.com/share/r/1awMk9YjXy/", icon: "bi-box", color: "#198754" },
            { title: "Record Storage", link: "https://www.facebook.com/share/p/1NRkBxbg9U/", icon: "bi-database", color: "var(--info)" },
            { title: "Logo Maker", link: "https://www.facebook.com/share/1JsdCtyTEf/", icon: "bi-palette", color: "#ffc107" },
            { title: "Hilot Booking", link: "https://www.facebook.com/share/v/14ZUQUK38jS/", icon: "bi-hand-index-thumb", color: "#198754" },
            { title: "Inventory Tracker", link: "https://www.facebook.com/share/p/1HCuQwMZLq/", icon: "bi-box-seam", color: "#6c757d" },
            { title: "Payroll Calc", link: "https://www.facebook.com/on.line.151642", icon: "bi-calculator", color: "#198754" },
            { title: "Fleet Management", link: "https://www.facebook.com/on.line.151642", icon: "bi-truck", color: "var(--info)" },
            { title: "Procurement", link: "https://www.facebook.com/on.line.151642", icon: "bi-cart-check", color: "#ffc107" },
            { title: "E-Library", link: "https://www.facebook.com/on.line.151642", icon: "bi-book", color: "var(--info)" },
            { title: "Client CRM", link: "https://www.facebook.com/on.line.151642", icon: "bi-person-vcard", color: "var(--danger)" },
            { title: "Task Scheduler", link: "https://www.facebook.com/on.line.151642", icon: "bi-calendar-check", color: "var(--info)" },
            { title: "Survey Tool", link: "https://www.facebook.com/on.line.151642", icon: "bi-clipboard-data", color: "#198754" },
            { title: "Visitor Logbook", link: "https://www.facebook.com/on.line.151642", icon: "bi-person-walking", color: "#6c757d" },
            { title: "Barangay Info", link: "https://www.facebook.com/share/p/17DpaZqCdr/", icon: "bi-info-circle", color: "#6c757d" }
        ];

        function playSFX(id) {
            const sound = document.getElementById(id);
            sound.currentTime = 0;
            sound.play();
        }

        function unlock() {
            playSFX('sfx-unlock');
            document.getElementById('bg-music').volume = 0.3;
            document.getElementById('bg-music').play();
            document.getElementById('gate-keeper').classList.add('gate-open');
            setTimeout(() => {
                document.getElementById('kpi-rev').innerText = "$921,084.10";
                mount(0);
            }, 800);
        }

        function mount(idx) {
            playSFX('sfx-nav');
            const data = appData[idx];
            const frame = document.getElementById('main-view');
            const wrapper = document.getElementById('view-wrapper');
            
            // Trigger Loading Border
            wrapper.classList.add('loading');
            frame.style.opacity = '0';
            
            setTimeout(() => {
                frame.src = data.link;
                document.getElementById('current-mod').innerText = data.title.toUpperCase();
                document.querySelectorAll('.nav-item').forEach((item, i) => {
                    item.classList.toggle('active', i === idx);
                });
                document.getElementById('status-log').innerText = `> Requesting Node: ${data.title}...`;
            }, 300);
        }

        function stopLoading() {
            const wrapper = document.getElementById('view-wrapper');
            const frame = document.getElementById('main-view');
            wrapper.classList.remove('loading');
            frame.style.opacity = '1';
            document.getElementById('status-log').innerText = `> Uplink Stable.`;
        }

        function filter() {
            const query = document.getElementById('modSearch').value.toUpperCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                item.style.display = item.innerText.toUpperCase().includes(query) ? "flex" : "none";
            });
        }

        const nav = document.getElementById('nav-list');
        appData.forEach((app, i) => {
            const el = document.createElement('div');
            el.className = 'nav-item';
            el.innerHTML = `<i class="${app.icon}" style="color:${app.color}"></i><span>${app.title}</span>`;
            el.onclick = () => mount(i);
            nav.appendChild(el);
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
            document.getElementById('kpi-stream').innerText = (Math.random() * 4 + 1).toFixed(2) + " GB/s";
        }, 1000);
    </script>
</body>
</html>
