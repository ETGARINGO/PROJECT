<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Precise Title Update -->
    <title>POS | Firebase Records Manager</title>
    
    <!-- Complete Link Icon (Favicon) Suite for Cross-Browser Compatibility -->
    <link rel="icon" type="image/png" href="pos.png">
    <link rel="shortcut icon" type="image/x-icon" href="pos.png">
    <link rel="apple-touch-icon" href="pos.png">

    <style>
        :root {
            --bg-color: #080a10; /* Rich Obsidian Black */
            --accent-gold: #d4af37; /* Burnished Champagne Gold */
            --gold-glow: rgba(212, 175, 55, 0.12);
            --text-main: #f5f6f9; /* Off-White Silk */
            --text-muted: #8a909e; /* Premium Platinum Muted */
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Luxury Ambient Ambient Glow Framework */
        .bg-glow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        .bg-glow-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-glow) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            right: -100px;
            animation: floatGlow 14s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 60%);
            bottom: -150px;
            left: -100px;
            animation: floatGlow 18s ease-in-out infinite alternate-reverse;
        }

        /* Screen Overlay / Entrance Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
        }

        /* Premium Minimalist Luxury Panel */
        .luxury-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 60px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.01) 0%, rgba(255, 255, 255, 0.03) 100%);
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 16px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2;
            opacity: 0;
            transform: scale(0.96);
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Premium Logo Presentation */
        .logo-wrapper {
            position: relative;
            margin-bottom: 32px;
            transform: translateY(10px);
            opacity: 0;
            animation: fadeInUp 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-wrapper img {
            width: 90px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.2));
        }

        /* High-End Typography Styling */
        .entrance-text {
            color: var(--text-main);
            font-family: "Times New Roman", Times, Baskerville, Georgia, serif; /* Elegant Serif Touch */
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 1s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-align: center;
        }

        .subtitle-text {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 1s 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Ultra-Thin Minimalist Loading Bar */
        .progress-container {
            width: 180px;
            height: 2px; /* Thinner line for a more boutique look */
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            opacity: 0;
            animation: fadeIn 0.8s 0.7s forwards;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(212,175,55,0.2), var(--accent-gold), rgba(212,175,55,0.2));
            transform: translateX(-100%);
            animation: loaderProgress 3s cubic-bezier(0.65, 0.05, 0.36, 1) infinite;
            box-shadow: 0 0 8px var(--accent-gold);
        }

        /* Main Embedded Application Viewport */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0;
            transform: scale(1.01);
            filter: grayscale(30%) brightness(0.8);
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 1.5s cubic-bezier(0.25, 1, 0.5, 1),
                        filter 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Smooth Cinematic Reveal State */
        iframe.loaded {
            opacity: 1;
            transform: scale(1);
            filter: grayscale(0%) brightness(1);
        }

        /* Master Hide Selector */
        .fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* Specialized Animation Engines */
        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes loaderProgress {
            0% { transform: translateX(-100%); }
            40% { transform: translateX(-10%); }
            60% { transform: translateX(10%); }
            100% { transform: translateX(100%); }
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.15); }
        }
    </style>
</head>
<body>

    <!-- Luxury Ambient Background Elements -->
    <div class="bg-glow-container">
        <div class="bg-glow-1"></div>
        <div class="bg-glow-2"></div>
    </div>

    <!-- Entrance Loader Overlay -->
    <div id="loader">
        <!-- Glassmorphism Presentation Shield -->
        <div class="luxury-card">
            <div class="logo-wrapper">
                <img src="pos.png" alt="System Logo">
            </div>
            
            <div class="entrance-text">POS | Firebase Records Manager</div>
            <div class="subtitle-text">Secure Cloud Database Infrastructure</div>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Application Embedded Frame -->
    <iframe 
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycbzcCV_G0eQLOgFbYIJSKkCp58KiroKzyXMkCr3g0KugLzxEwy9E7TpGbRqN0McOSuI/exec" 
      allow="geolocation; microphone; camera; clipboard-write">
    </iframe>

    <script>
        const iframe = document.getElementById('app-frame');
        const loader = document.getElementById('loader');

        // Monitor System Initialization Completion
        iframe.addEventListener('load', () => {
            // Initiate deep cinema application fade-in
            iframe.classList.add('loaded');
            // Gracefully dissipate the presentation card
            loader.classList.add('fade-out');
        });
    </script>

</body>
</html>
