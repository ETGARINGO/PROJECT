<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png.png">
    <link rel="apple-touch-icon" href="pos.png.png">

    <style>
        /* Full View Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a; /* Dark background for a sleek look */
        }

        .pos-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Top Navigation Bar */
        .navbar {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #34495e;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 5px;
            background: white; /* Makes the logo pop if it has transparency */
        }

        .brand span {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .controls button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .controls button:hover {
            background: #2ecc71;
        }

        /* The POS Frame */
        .iframe-container {
            flex-grow: 1;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pos-wrapper">
        <nav class="navbar">
            <div class="brand">
                <img src="pos.png.png" alt="Store Logo">
                <span>SARI-SARI STORE POS</span>
            </div>
            <div class="controls">
                <button onclick="toggleFullScreen()">Toggle Full Screen</button>
                <button onclick="location.reload()" style="background:#7f8c8d; margin-left:5px;">Refresh</button>
            </div>
        </nav>

        <div class="iframe-container">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
                allow="camera; geolocation; microphone; display-capture"
                loading="lazy">
            </iframe>
        </div>
    </div>

    <script>
        // Full Screen Toggle Function
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>

</body>
</html>
