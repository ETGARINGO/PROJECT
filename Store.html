<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #1a1a1a; /* Darker bg prevents white flash */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- Loading Screen Styles --- */
        #loader {
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loader img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            /* Pulse Animation for Logo */
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* --- POS Container Animation --- */
        .pos-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; /* Start hidden */
            transform: translateY(20px); /* Start slightly lower */
            transition: opacity 1s ease-out, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Triggered via JS when loaded */
        .pos-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="pos.png.png" alt="Logo">
        <div style="color: #555; font-weight: 500; letter-spacing: 1px;">INITIALIZING SYSTEM...</div>
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone"
            onload="revealPOS()">
        </iframe>
    </div>

    <script>
        function revealPOS() {
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('posWrapper');

            // 1. Hide the loader smoothly
            loader.style.opacity = '0';
            
            // 2. Small delay before showing POS for a cleaner transition
            setTimeout(() => {
                loader.style.display = 'none';
                // 3. Trigger the Slide-Up and Fade-In effect
                wrapper.classList.add('show');
            }, 600);
        }
    </script>
</body>
</html>
