<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial', sans-serif;
        }

        /* Lightning Flash Layer */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 1000; pointer-events: none;
        }

        /* Full Screen Logo View */
        #loader {
            position: fixed; z-index: 999; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            transition: transform 0.5s cubic-bezier(0.95, 0.05, 0.795, 0.035);
        }

        #loader img {
            max-width: 80%; /* Large View */
            max-height: 60vh;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
            animation: breathe 3s infinite ease-in-out;
            cursor: pointer;
        }

        /* Instruction Text */
        .tap-text {
            color: white;
            margin-top: 30px;
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0.6;
            animation: blink 1.5s infinite;
        }

        /* POS Container Hidden initially */
        .pos-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
        }

        .pos-container.active {
            opacity: 1; visibility: visible;
            animation: reveal 0.8s ease-out;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Animations */
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4)); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.8; }
        }

        @keyframes lightning-strike {
            0% { opacity: 0; }
            10% { opacity: 1; }
            15% { opacity: 0.4; }
            20% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes reveal {
            0% { transform: scale(1.2); filter: brightness(5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body onclick="initiateStrike()">

    <audio id="thunder" src="https://www.soundjay.com/nature/sounds/thunder-crack-1.mp3"></audio>

    <div id="flash"></div>

    <div id="loader">
        <img src="pos.png" alt="POS Logo">
        <div class="tap-text">TAP TO ENTER SYSTEM</div>
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            id="posFrame"
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone">
        </iframe>
    </div>

    <script>
        let isLoaded = false;
        const frame = document.getElementById('posFrame');
        const tapText = document.querySelector('.tap-text');

        // Check when the POS is ready in the background
        frame.onload = function() {
            isLoaded = true;
            tapText.innerText = "SYSTEM READY";
            tapText.style.color = "#00ff88";
        };

        function initiateStrike() {
            // Only allow strike if the POS is ready or give it a second
            const flash = document.getElementById('flash');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('posWrapper');
            const audio = document.getElementById('thunder');

            // 1. Fire Thunder Sound
            audio.play().catch(e => console.log("Sound played"));

            // 2. Visual Lightning Flash
            flash.style.animation = "lightning-strike 0.5s ease-out forwards";

            // 3. Transform the Loader (Zoom in/out effect)
            loader.style.transform = "scale(2)";
            loader.style.opacity = "0";

            // 4. Reveal the POS
            setTimeout(() => {
                loader.style.display = 'none';
                wrapper.classList.add('active');
            }, 200);
        }
    </script>
</body>
</html>
