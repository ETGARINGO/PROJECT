<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    <link rel="icon" type="image/png" href="pos.png">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: sans-serif; perspective: 1200px;
        }

        /* High-Speed Lightning */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 1000; pointer-events: none;
        }

        #loader {
            position: fixed; z-index: 999; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.2s ease-in;
        }

        /* The Logo: Optimized for GPU Speed */
        #logo {
            width: 80%; max-width: 450px;
            will-change: transform, filter;
            transition: transform 0.25s cubic-bezier(0.4, 0, 1, 1), filter 0.2s;
        }

        /* POS Entrance */
        .pos-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transform: scale(1.1); visibility: hidden;
        }

        .pos-container.active {
            opacity: 1; visibility: visible; transform: scale(1);
            transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            animation: shake 0.2s;
        }

        iframe { width: 100%; height: 100%; border: none; }

        @keyframes strike {
            0%, 100% { opacity: 0; }
            10%, 30% { opacity: 1; }
            20% { opacity: 0.5; }
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(10px,-5px); }
            50% { transform: translate(-10px,5px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body onclick="fastLaunch()">

    <audio id="thunder" src="https://www.soundjay.com/nature/sounds/thunder-crack-1.mp3" preload="auto"></audio>
    <div id="flash"></div>

    <div id="loader">
        <img src="pos.png" id="logo" alt="POS Logo">
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            id="posFrame"
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation;">
        </iframe>
    </div>

    <script>
        const audio = document.getElementById('thunder');
        const logo = document.getElementById('logo');
        const flash = document.getElementById('flash');
        const loader = document.getElementById('loader');
        const wrapper = document.getElementById('posWrapper');

        // Pre-warm the audio
        window.addEventListener('touchstart', () => { audio.load(); }, {once: true});

        function fastLaunch() {
            // 1. Instant sound and flash
            audio.play();
            flash.style.animation = "strike 0.3s ease-out forwards";

            // 2. Ultra-fast zoom burst
            logo.style.transform = "scale(8) translateZ(800px)";
            logo.style.filter = "brightness(5) blur(10px)";
            
            // 3. Reveal POS almost instantly
            setTimeout(() => {
                loader.style.opacity = "0";
                wrapper.classList.add('active');
                setTimeout(() => { loader.style.display = 'none'; }, 200);
            }, 100);
        }
    </script>
</body>
</html>
