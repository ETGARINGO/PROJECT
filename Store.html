<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png">
    <link rel="apple-touch-icon" href="pos.png">

    <style>
        /* Reset and Full View Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
        }

        /* Full Screen Container */
        .pos-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Top Bar / Header */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            border-radius: 4px;
        }

        .store-name {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Iframe Styling */
        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* Footer / Status Bar */
        .footer {
            background: #ecf0f1;
            font-size: 12px;
            padding: 5px 20px;
            color: #7f8c8d;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        /* Responsive Mobile View */
        @media (max-width: 600px) {
            .store-name { font-size: 1rem; }
            .header { padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div class="pos-container">
        <header class="header">
            <div class="header-left">
                <img src="pos.png" alt="POS Logo" class="logo">
                <span class="store-name">SARI-SARI STORE POS</span>
            </div>
            <div class="header-right">
                <button onclick="location.reload()" style="cursor:pointer; background:transparent; border:1px solid white; color:white; padding:4px 10px; border-radius:4px;">Refresh</button>
            </div>
        </header>

        <iframe 
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone"
            title="Sari Sari Store POS System">
        </iframe>

        <footer class="footer">
            &copy; 2025 Sari-Sari Store Management System | Connected to Cloud Database
        </footer>
    </div>

</body>
</html>
