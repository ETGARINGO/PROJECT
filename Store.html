<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS | Powered Up</title>
    
    <link rel="icon" type="image/png" href="pos.png">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Lightning Flash Layer */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 1000; pointer-events: none;
        }

        /* Loading Screen */
        #loader {
            position: fixed; z-index: 999; top: 0; left: 0; 
            width: 100%; height: 100%; background: #0a0a0a;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
        }

        #loader img {
            width: 120px; height: 120px;
            filter: drop-shadow(0 0 15px rgba(0, 150, 255, 0.8));
            animation: electricity 1.5s infinite alternate;
        }

        #start-btn {
            margin-top: 30px; padding: 12px 30px;
            background: transparent; border: 2px solid #00d4ff;
            color: #00d4ff; cursor: pointer; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            border-radius: 5px; transition: 0.3s;
        }

        #start-btn:hover { background: #00d4ff; color: #000; }

        /* POS Container */
        .pos-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transform: scale(0.95);
        }

        .pos-container.active {
            opacity: 1; transform: scale(1);
            transition: opacity 0.1s;
            animation: hit 0.4s ease-out;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Animations */
        @keyframes electricity {
            0% { filter: drop-shadow(0 0 5px rgba(0, 150, 255, 0.4)); transform: scale(0.98); }
            100% { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 1)); transform: scale(1.02); }
        }

        @keyframes lightning-bolt {
            0% { opacity: 0; } 10% { opacity: 1; } 20% { opacity: 0.3; }
            30% { opacity: 1; } 100% { opacity: 0; }
        }

        @keyframes hit {
            0% { transform: translateX(-10px) skewX(2deg); }
            20% { transform: translateX(10px) skewX(-2deg); }
            40% { transform: translateX(-5px); }
            60% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <audio id="thunder" src="https://www.soundjay.com/nature/sounds/thunder-crack-1.mp3"></audio>

    <div id="flash"></div>

    <div id="loader">
        <img src="pos.png" alt="POS Logo">
        <button id="start-btn" onclick="initiateStrike()">Launch POS</button>
        <p id="status-text" style="color: #444; margin-top: 15px;">WAITING FOR POWER...</p>
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            id="posFrame"
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone">
        </iframe>
    </div>

    <script>
        const frame = document.getElementById('posFrame');
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status-text');

        // Check if iframe is actually loaded before allowing the strike
        frame.onload = function() {
            btn.style.borderColor = "#00ff88";
            btn.style.color = "#00ff88";
            status.innerText = "SYSTEM CHARGED. READY.";
        };

        function initiateStrike() {
            const flash = document.getElementById('flash');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('posWrapper');
            const audio = document.getElementById('thunder');

            // Play Thunder
            audio.play();

            // Flash Animation
            flash.style.animation = "lightning-bolt 0.4s ease-out forwards";

            // Reveal POS mid-flash
            setTimeout(() => {
                loader.style.display = 'none';
                wrapper.classList.add('active');
            }, 100);
        }
    </script>
</body>
</html>
