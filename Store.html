<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png.png">
    <link rel="apple-touch-icon" href="pos.png.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Start black for better lightning contrast */
            font-family: sans-serif;
        }

        /* Lightning Flash Overlay */
        #lightning-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
        }

        /* Container with entrance animation */
        .pos-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 0.3s ease;
        }

        /* The "Struck" effect */
        .pos-container.show {
            opacity: 1;
            transform: scale(1);
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Loading Screen */
        #loader {
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #loader img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            border-radius: 12px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Animations */
        @keyframes lightning-anim {
            0% { opacity: 0; }
            10% { opacity: 1; }
            20% { opacity: 0.5; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <audio id="thunder-snd" src="https://www.soundjay.com/nature/sounds/thunder-crack-1.mp3"></audio>

    <div id="lightning-flash"></div>

    <div id="loader">
        <img src="pos.png.png" alt="Logo">
        <p style="letter-spacing: 2px; font-size: 12px;">CHARGING SYSTEM...</p>
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone"
            onload="strikeLightning()">
        </iframe>
    </div>

    <script>
        function strikeLightning() {
            const flash = document.getElementById('lightning-flash');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('posWrapper');
            const audio = document.getElementById('thunder-snd');

            // 1. Trigger Sound (Browser might block auto-play until user clicks once)
            audio.play().catch(e => console.log("Audio needs user interaction first"));

            // 2. Visual Lightning Strike
            flash.style.animation = "lightning-anim 0.6s ease-out forwards";

            // 3. Swap Loader for POS mid-flash
            setTimeout(() => {
                loader.style.display = 'none';
                wrapper.classList.add('show');
            }, 150);
        }
    </script>
</body>
</html>
