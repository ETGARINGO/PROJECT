<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            perspective: 1000px; /* Enables 3D zoom depth */
        }

        /* Lightning Flash Layer */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 1000; pointer-events: none;
        }

        /* Loader Wrapper */
        #loader {
            position: fixed; z-index: 999; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            transition: all 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        /* The Zooming PNG */
        #loader img {
            width: 85%;
            max-width: 500px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            transform: translateZ(0);
            transition: transform 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045), filter 0.3s;
        }

        /* Loading Animation */
        .pulse {
            animation: breathe 3s infinite ease-in-out;
        }

        /* Text Styling */
        .instruction {
            color: #555;
            margin-top: 40px;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* POS Container */
        .pos-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transform: scale(0.8);
            visibility: hidden;
        }

        .pos-container.active {
            opacity: 1; visibility: visible;
            transform: scale(1);
            transition: opacity 0.5s ease-out, transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Keyframes */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        @keyframes strike {
            0% { opacity: 0; }
            5% { opacity: 1; }
            10% { opacity: 0.2; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body onclick="launchSystem()">

    <audio id="thunder" src="https://www.soundjay.com/nature/sounds/thunder-crack-1.mp3"></audio>
    <div id="flash"></div>

    <div id="loader">
        <img src="pos.png" id="logo" class="pulse" alt="POS Logo">
        <div class="instruction" id="hint">Initializing...</div>
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            id="posFrame"
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone">
        </iframe>
    </div>

    <script>
        const frame = document.getElementById('posFrame');
        const hint = document.getElementById('hint');
        const logo = document.getElementById('logo');
        let ready = false;

        frame.onload = () => {
            ready = true;
            hint.innerText = "Click to Enter Store";
            hint.style.color = "#00ffcc";
        };

        function launchSystem() {
            if (!ready) return; // Prevent clicking before iframe loads

            const flash = document.getElementById('flash');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('posWrapper');
            const audio = document.getElementById('thunder');

            // 1. Play Sound
            audio.play();

            // 2. Visual Strike
            flash.style.animation = "strike 0.5s ease-out forwards";

            // 3. THE ZOOM: Logo flies toward user
            logo.style.transform = "scale(10) translateZ(500px)";
            logo.style.filter = "brightness(10) blur(5px)";
            loader.style.backgroundColor = "transparent";
            loader.style.opacity = "0";

            // 4. Reveal POS with a "bounce" reveal
            setTimeout(() => {
                loader.style.display = 'none';
                wrapper.classList.add('active');
            }, 300);
        }
    </script>
</body>
</html>
