<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png.png">
    <link rel="apple-touch-icon" href="pos.png.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
            font-family: sans-serif;
        }

        /* Container to hold the Apps Script Frame */
        .pos-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Simple Loading Screen */
        #loader {
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #loader img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="pos.png.png" alt="Logo">
        <p>Opening POS...</p>
    </div>

    <div class="pos-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone"
            onload="hideLoader()">
        </iframe>
    </div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
