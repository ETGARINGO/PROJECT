<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store POS</title>
    
    <link rel="icon" type="image/png" href="pos.png">

    <link rel="icon" sizes="192x192" href="pos.png">
    <link rel="icon" sizes="512x512" href="pos.png">
    
    <link rel="apple-touch-icon" href="pos.png">
    
    <meta name="msapplication-TileImage" content="pos.png">
    <meta name="msapplication-TileColor" content="#000000">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: sans-serif; perspective: 1500px;
        }

        /* Fast Lightning Flash */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 1000; pointer-events: none;
        }

        /* Splash Screen */
        #loader {
            position: fixed; z-index: 999; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer;
        }

        /* Large Centered Logo */
        #logo {
            width: 85%; max-width: 500px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            will-change: transform, filter;
            transition: transform 0.2s cubic-bezier(0.4, 0, 1, 1), filter 0.15s;
        }

        /* Animated Text */
        .status {
            color: #fff; margin-top: 30px; letter-spacing: 5px;
            font-size: 12px; font-weight: bold; opacity: 0.5;
            animation: pulse 1s infinite alternate;
        }

        /* POS Viewport */
        .pos-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transform: scale(1.1); visibility: hidden;
            will-change: transform, opacity;
        }

        .pos-container.active {
            opacity: 1; visibility: visible; transform: scale(1);
            transition: opacity 0.2s ease-out, transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
            animation: impact-shake 0.25s;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Fast Keyframes */
        @keyframes pulse { from { opacity: 0.2; } to { opacity: 0.8; } }

        @keyframes strike-anim {
            0%, 100% { opacity: 0; }
            10%, 40% { opacity: 1; }
            20% { opacity: 0.4; }
        }

        @keyframes impact-shake {
            0% { transform: translate(0,0); }
            20% { transform: translate(15px, -10px); }
            40% { transform: translate(-15px, 10px); }
            60% { transform: translate(10px, 5px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body onclick="launchPOS()">

    <audio id="thunderSfx" src="https://www.soundjay.com/nature/sounds/thunder-crack-1.mp3" preload="auto"></audio>
    
    <div id="flash"></div>

    <div id="loader">
        <img src="pos.png" id="logo" alt="Store Logo">
        <div class="status" id="txt">TAP TO START</div>
    </div>

    <div id="posWrapper" class="pos-container">
        <iframe 
            id="posFrame"
            src="https://script.google.com/macros/s/AKfycbzM_8yPXPD4i4eIXb_ZOxSsWOvVsDWJMmmwaGEjH044tIktwm6SIc5zO_dj7vhyC7o3/exec" 
            allow="camera; geolocation; microphone">
        </iframe>
    </div>

    <script>
        const audio = document.getElementById('thunderSfx');
        const logo = document.getElementById('logo');
        const flash = document.getElementById('flash');
        const loader = document.getElementById('loader');
        const wrapper = document.getElementById('posWrapper');
        const frame = document.getElementById('posFrame');
        const txt = document.getElementById('txt');

        let isReady = false;

        // Iframe pre-load detection
        frame.onload = () => {
            isReady = true;
            txt.innerText = "READY";
            txt.style.color = "#00ffcc";
        };

        function launchPOS() {
            // Instant trigger
            audio.play().catch(() => {}); 
            
            // Visual Strike Start
            flash.style.animation = "strike-anim 0.3s forwards";
            
            // Extreme Zoom
            logo.style.transform = "scale(15) translateZ(1000px)";
            logo.style.filter = "brightness(10) blur(20px)";
            
            // Swap Content at the peak of the flash (150ms)
            setTimeout(() => {
                loader.style.display = 'none';
                wrapper.classList.add('active');
            }, 150);
        }
    </script>
</body>
</html>
